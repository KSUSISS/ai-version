# Пайплайн для сравнения всех трёх версий одновременно
name: Comparative Test Report

# Только ручной запуск
on:
  workflow_dispatch:

jobs:
  # Задача 1: Тестирование версии от ИИ №1
  test-ai-v1:
    name: Test AI Version 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ai-version-1 # Берём код из ветки v1
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal

  # Задача 2: Тестирование версии от ИИ №2
  test-ai-v2:
    name: Test AI Version 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ai-version-2 # Берём код из ветки v2
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal

  # Задача 3: Тестирование версии от ИИ №3
  test-ai-v3:
    name: Test AI Version 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ai-version-3 # Берём код из ветки v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal
