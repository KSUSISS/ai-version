# Название пайплайна
name: .NET CI Pipeline (NUnit)

# Триггеры запуска
on:
  push:
    branches: [ "ai-version-1", "ai-version-2", "ai-version-3" ]
  pull_request:
    branches: [ "ai-version-1", "ai-version-2", "ai-version-3" ]
  workflow_dispatch: # Ручной запуск через интерфейс GitHub

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачать код из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Установить .NET 6
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      # Шаг 3: Восстановить зависимости
      - name: Restore dependencies
        run: dotnet restore ai-version.sln

      - name: Build
        run: dotnet build ai-version.sln --no-restore

      - name: Test
        run: dotnet test ai-version.sln --no-build --verbosity normal --logger "console;verbosity=detailed"

      # Шаг 6: Сохранить результаты тестов как артефакт
      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nunit-test-results-${{ github.ref_name }}
          path: '**/*.trx'
