name: .NET CI Pipeline (NUnit)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Ветка для тестирования'
        required: true
        default: 'ai-version-1'
        type: choice
        options:
          - ai-version-1
          - ai-version-2
          - ai-version-3

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          # ВОТ МАГИЯ: Заставляем гитхаб скачать ту ветку, которую ты выберешь в меню!
          ref: ${{ github.event.inputs.branch }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore ai-version.sln

      - name: Build
        run: dotnet build ai-version.sln --no-restore

      - name: Test
        run: dotnet test ai-version.sln --no-build --verbosity normal --logger "console;verbosity=detailed"

      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nunit-test-results
          path: '**/*.trx'
